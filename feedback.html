<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style423.css">

</head>
<body>
    <div 
    class="feedback-container">
    <h1>Share Your Feedback</h1>
<p>
    We value your thoughts!
     Please let us know how we can 
     improve your shopping experience.
</p>

<from action="#">
    <div class="input-group">
        <input type="text"
        id="name" required placeholder=" ">
        <label 
        for="name">Your name</label>
    </div>

    <div 
    class="input-group">
                    <textarea
                    id="message" rows="5" required
                    placeholder=" "></textarea>
                    <label
                    for="message">Your message</label>
                    </div>

                    <button type="submit"
                    class="submit-btn">submit Feedback</button>
</div>
</from>
</div>

<a href="index.html"
class="back-btn">Back to shop</a>

    
</body>
</html>
